<VirtualHost *:80>
    DocumentRoot /var/www/html/public

    <Directory /var/www/html/public>
        AllowOverride None
        Require all granted
        # Toutes les requêtes non-fichier sont routées vers index.php (Symfony / API Platform)
        FallbackResource /index.php
    </Directory>

    # Les assets compilés par Encore ne passent pas par index.php
    <Directory /var/www/html/public/build>
        FallbackResource disabled
        Header set Cache-Control "public, max-age=31536000, immutable"
    </Directory>

    # HTTPS est terminé par le reverse proxy de l'hôte : on propage l'info à Symfony
    SetEnvIf X-Forwarded-Proto "https" HTTPS=on

    DirectoryIndex index.php

    ErrorLog /proc/self/fd/2
    CustomLog /proc/self/fd/1 combined
</VirtualHost>
