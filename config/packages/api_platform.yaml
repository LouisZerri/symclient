api_platform:
    title: SymReact API
    description: API de gestion des clients et des factures
    version: 1.0.0
    show_webby: false
    # Réactive les kernel event listeners (KernelEvents::VIEW + EventPriorities)
    # utilisés par nos subscribers App\Events\* (hash du mot de passe, user du customer,
    # chrono de la facture). Désactivés par défaut en API Platform 4.
    use_symfony_listeners: true
    mapping:
        paths: ['%kernel.project_dir%/src/Entity']
    formats:
        jsonld: ['application/ld+json']
        json: ['application/json']
    docs_formats:
        jsonld: ['application/ld+json']
        jsonopenapi: ['application/vnd.openapi+json']
        html: ['text/html']
    defaults:
        stateless: true
        cache_headers:
            vary: ['Content-Type', 'Authorization', 'Origin']
        pagination_enabled: false
        pagination_client_enabled: true
        pagination_client_items_per_page: true
        pagination_items_per_page: 30
